name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize

env:
  ADMIN_KEY: foobar
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/echo-web

  UNO_API_PORT: 8000
  TELEMENTRY_ENABLED: false
  NEXT_PUBLIC_API_URL: http://localhost:8000

  NEXT_PUBLIC_SANITY_DATASET: "testing"

  FEIDE_CLIENT_ID: ${{ secrets.FEIDE_CLIENT_ID }}
  FEIDE_CLIENT_SECRET: ${{ secrets.FEIDE_CLIENT_SECRET }}

  AUTH_SECRET: "test-secret-for-ci-e2e-tests-only"

  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    name: 📝 Lint, Format & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🐢 Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: 🐹 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3
          cache-dependency-path: apps/uno/go.sum

      - name: 🔎 Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: apps/uno

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔃 Sync docs
        run: pnpm --filter=docs sync

      - name: 🆎 Typegen
        run: pnpm --filter=web typegen

      - name: 📝 Lint
        run: pnpm lint

      - name: 💄 Check style
        run: pnpm format:check

      - name: 🛫 Type check
        run: pnpm typecheck

      - name: 🐹 Lint Go code
        working-directory: apps/uno
        run: golangci-lint run

  check-docs:
    name: 📚 Check Backend Docs
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v5

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🐢 Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22.20.0
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: 🐹 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3
          cache-dependency-path: apps/uno/go.sum

      - name: 📦 Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: 📚 Check Swagger docs are generated
        run: |
          pnpm --filter=uno swag:init
          if ! git diff --exit-code apps/uno/docs/; then
            echo "Error: Swagger docs are out of sync. Please run 'pnpm --filter=uno swag:init' and commit the changes."
            exit 1
          fi

  test-unit-frontend:
    name: 🧪 Unit Tests (Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🐢 Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run frontend unit tests
        run: pnpm --filter=web test:unit

  test-unit-backend:
    name: 🧪 Unit Tests (Backend)
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v5

      - name: 🐹 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3
          cache-dependency-path: apps/uno/go.sum

      - name: 🧪 Run backend unit tests with coverage
        working-directory: apps/uno
        run: go test ./... -v -coverprofile=coverage.out

      - name: 📊 Show coverage summary
        working-directory: apps/uno
        run: go tool cover -func=coverage.out | tail -1

  test-e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy

    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    services:
      postgres:
        image: postgres:15.14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echo-web
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: 🐢 Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22.21.1
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml

      - name: 🐹 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.3
          cache-dependency-path: apps/uno/go.sum

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Migrate database
        run: pnpm db:migrate

      - name: 🆎 Typegen
        run: pnpm --filter=web typegen

      - name: 🌱 Seed database
        run: pnpm seed database --mode test

      - name: 👷🏻‍♂️ Build
        run: pnpm build --filter=@echo-webkom/web --filter=@echo-webkom/uno

      - name: 🎭 Run playwright tests
        run: pnpm test:e2e

      - name: 📥 Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 7
