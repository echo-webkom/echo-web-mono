packages:
  - apps/*
  - packages/*
  - playwright

allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - "@astrojs/starlight"
  - "astro"

onlyBuiltDependencies:
  - "@swc/core"
  - "@tailwindcss/oxide"
  - core-js
  - esbuild
  - sharp
  - unrs-resolver
  - workerd
